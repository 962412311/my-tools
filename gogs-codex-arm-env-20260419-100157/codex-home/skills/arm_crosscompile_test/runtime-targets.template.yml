  - "Test host SSH login is verified from this workstation."
  - "Backend is service-managed through gogs-backend.service."
  - "Frontend is built locally and synced only to the test host."
  - "Nginx serves /userdata/GOGS/frontend/dist and proxies /api/ and /ws to localhost."
